name: Backend API

on:
  push:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-api.yml"
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-api.yml"

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: cd backend && go mod download

      - name: Go vet
        run: cd backend && go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

      - name: Build
        run: cd backend && go build -v ./...

  deploy:
    name: Deploy to self-hosted server
    needs: lint-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: prod # Protect deployments to main branch with approval requirements
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and run backend API
        env:
          API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          docker compose build api
          docker compose up -d db api

      - name: Cleanup old Docker data
        if: always() # This ensures it runs even if the build fails
        run: docker system prune -f
