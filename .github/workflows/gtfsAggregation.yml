name: GTFS Aggregation

on:
  push:
    paths:
      - "gtfsAggregation/**"
      - "docker-compose.yml"
      - ".github/workflows/gtfsAggregation.yml"
  pull_request:
    paths:
      - "gtfsAggregation/**"
      - "docker-compose.yml"
      - ".github/workflows/gtfsAggregation.yml"

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: cd gtfsAggregation && go mod download

      - name: Go vet
        run: cd gtfsAggregation && go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: gtfsAggregation

      - name: Build
        run: cd gtfsAggregation && go build -v ./...

  deploy:
    name: Deploy to self-hosted server
    needs: lint-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/f/gtfs-database'
    runs-on: self-hosted
    # environment: prod # Protect deployments to main branch with approval requirements
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Build aggregator image and start services
        env:
          API_KEY: ${{ secrets.GTFS_API_KEY }}
          POSTGRES_DSN: postgres://postgres:postgres@db:5432/forseningskartan?sslmode=disable
        run: |
          docker compose build aggregator
          docker compose up -d db scheduler api

      - name: Wait for database readiness
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U postgres -d forseningskartan; then
              exit 0
            fi
            sleep 2
          done
          echo "Database did not become ready in time"
          exit 1

      - name: Cleanup old Docker data
        if: always() # This ensures it runs even if the build fails
        run: docker system prune -f
