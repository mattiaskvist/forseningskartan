name: GTFS Aggregation

on:
    push:
        paths:
            - "gtfsAggregation/**"
    pull_request:
        paths:
            - "gtfsAggregation/**"

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"

            - name: Install dependencies
              run: cd gtfsAggregation && go mod download

            - name: Go vet
              run: cd gtfsAggregation && go vet ./...

            - name: Lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: latest
                  working-directory: gtfsAggregation
